# ========================
# 模型配置
# ========================
model:
  name_or_path: "model/Qwen2.5-0.5B-Instruct"   # 基座模型路径
  max_length: 512          # 最大序列长度（意图分类不需要太长）
  dtype: "bf16"            # 训练精度，bf16 节省显存

# ========================
# 数据配置
# ========================
data:
  train_file: "data/processed/train.json"
  val_file: "data/processed/val.json"
  test_file: "data/processed/test.json"

# ========================
# 训练超参数
# ========================
training:
  output_dir: "outputs/intent_model_v1"
  num_train_epochs: 10                # 训练轮数
  per_device_train_batch_size: 8      # 每GPU训练batch大小
  per_device_eval_batch_size: 16      # 每GPU评估batch大小
  gradient_accumulation_steps: 4      # 梯度累积步数（等效 batch_size = 8*4=32）
  learning_rate: 2.0e-5               # 学习率（全参微调建议 1e-5 ~ 5e-5）
  weight_decay: 0.01                  # 权重衰减
  warmup_ratio: 0.1                   # 预热比例
  lr_scheduler_type: "cosine"         # 学习率调度器
  logging_steps: 10                   # 每 N 步打印日志
  eval_strategy: "epoch"              # 每个 epoch 评估
  save_strategy: "epoch"              # 每个 epoch 保存
  save_total_limit: 3                 # 最多保存 3 个 checkpoint
  load_best_model_at_end: true        # 训练结束加载最佳模型
  metric_for_best_model: "eval_accuracy"  # 用准确率选最佳模型
  greater_is_better: true
  seed: 42
  bf16: true                          # 使用 bf16 混合精度训练